# Welcome to Junteng Liu's Academic Page

# Site Information
title:            "Junteng Liu"
description:      "First-year PhD candidate at HKUST NLP Group. Researching NLP, LLM Reasoning, Reinforcement Learning, VLM Hallucination, and LLM Truthfulness."
url:              "https://Vicent0205.github.io"
baseurl:          ""

# Repository information
repository:       "danielbob0201-png/Vicent0205.github.io"

# Author information
author:
  name:           "Junteng Liu"
  email:          "jliugi@connect.ust.hk"
  bio:            "First-year PhD candidate at HKUST NLP Group, focusing on NLP, machine learning, LLM reasoning, and interpretability."
  location:       "Hong Kong"
  employer:       "Hong Kong University of Science and Technology"
  uri:            "https://Vicent0205.github.io"
  github:         "Vicent0205"
  twitter:        "junteng88716710"
  googlescholar:  "https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate"

# Build settings
locale:           "en-US"
markdown:         kramdown
highlighter:      rouge
permalink:        pretty

# Sass/SCSS
sass:
  sass_dir:       _sass
  style:          compressed

# Exclude from processing
exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "vendor"

# Theme
theme: minima

# Collections
collections:
  publications:
    output: true
    permalink: /publication/:path/
  talks:
    output: true
    permalink: /talk/:path/
  teaching:
    output: true
    permalink: /teaching/:path/

# Publication categories
publication_category:
  books:
    title: Books
  manuscripts:
    title: Journal Articles
  conferences:
    title: Conference Papers

# Site settings
teaser:           ""
breadcrumbs:      false
words_per_minute: 160
future:           true
read_more:        "disabled"
talkmap_link:     false

# Comments
comments:
  provider:       ""
  disqus:
    shortname:    ""
  discourse:
    server:       ""
  facebook:
    appid:        ""
    num_posts:    ""
    colorscheme:  ""

# Others
staticman:
  allowedFields:  []
  branch:         "gh-pages"
  commitMessage:  "New comment."
  filename:       "comment-{@timestamp}"
  format:         "yml"
  moderation:     true
  path:           "_data/comments/{options.slug}"
  requiredFields: []

# Analytics
analytics:
  provider:       "false"
  google:
    tracking_id:  ""

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - "package.json*"
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown
markdown:  kramdown
highlighter: rouge
lsi:       false
excerpt_separator: "\n\n"
incremental: false

# Kramdown settings
kramdown:
  input:         GFM
  hard_wrap:     false
  auto_ids:      true
  footnote_nr:   1
  entity_output: as_char
  toc_levels:    1..6
  smart_quotes:  lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output:  true
    permalink: /:collection/:path/
  publications:
    output:  true
    permalink: /:collection/:path/
  portfolio:
    output:  true
    permalink: /:collection/:path/
  talks:
    output:  true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path:   ""
      type:   posts
    values:
      layout:        single
      author_profile: true
      read_time:     true
      comments:      true
      share:         true
      related:       true
  - scope:
      path:   ""
      type:   pages
    values:
      layout:        single
      author_profile: true
  - scope:
      path:   ""
      type:   teaching
    values:
      layout:        single
      author_profile: true
      share:         true
      comments:      true
  - scope:
      path:   ""
      type:   publications
    values:
      layout:        single
      author_profile: true
      share:         true
      comments:      true
  - scope:
      path:   ""
      type:   portfolio
    values:
      layout:        single
      author_profile: true
      share:         true
      comment:        true
  - scope:
      path:   ""
      type:   talks
    values:
      layout:        talk
      author_profile: true
      share:         true

# Output
permalink:         /:categories/:title/

# Timezone
timezone:          "Etc/UTC"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Category/tag archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# SEO
google_site_verification: ""
bing_site_verification:   ""
alexa_site_verification:  ""
yandex_site_verification: ""

# Social
twitter:
  username: "junteng88716710"
facebook:
  username: ""
  app_id:   ""
  publisher: ""
social:
  type:   Person
  links:  []

# Atom feed
atom_feed:
  hide:  false
  path:  ""
